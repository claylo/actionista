# Update Actions Index
# Fetches latest versions for all tracked GitHub Actions daily

name: Update Index

on:
  schedule:
    - cron: '0 6 * * *'  # Daily at 6 AM UTC
  workflow_dispatch:
    inputs:
      dry-run:
        description: 'Dry run (no PR created)'
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: update-index
  cancel-in-progress: true

jobs:
  update:
    name: Update Actions Index
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6

      - name: Install yq
        uses: mikefarah/yq@v4

      - name: Update index
        id: update
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: scripts/update-index

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet skills/github-actions/index.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "## Changes detected" >> $GITHUB_STEP_SUMMARY
            echo '```diff' >> $GITHUB_STEP_SUMMARY
            git diff skills/github-actions/index.json >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi

      - name: Create Pull Request
        if: steps.changes.outputs.changed == 'true' && inputs.dry-run != true
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'chore: update actions index'
          title: 'chore: Update GitHub Actions index'
          body: |
            ## Automated Index Update

            This PR updates the GitHub Actions index with latest version information.

            ### Changes
            - Updated action versions via GitHub GraphQL API

            ### Review
            Please review the version changes before merging.

            ---
            Generated by [Actionista](https://github.com/claylo/actionista)
          branch: update-index
          delete-branch: true
          labels: |
            automated
            dependencies

      - name: Dry run summary
        if: inputs.dry-run == true && steps.changes.outputs.changed == 'true'
        run: |
          echo "## Dry Run - Changes Found" >> $GITHUB_STEP_SUMMARY
          echo "The following changes would be made:" >> $GITHUB_STEP_SUMMARY
          echo '```json' >> $GITHUB_STEP_SUMMARY
          cat skills/github-actions/index.json >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: No changes
        if: steps.changes.outputs.changed == 'false'
        run: echo "No changes to index - all actions are up to date" >> $GITHUB_STEP_SUMMARY
