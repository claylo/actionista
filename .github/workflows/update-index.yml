# Update Actions Index
# Fetches latest versions for all tracked GitHub Actions daily.
# Commits directly to main, triggering release-on-update.yml for packaging.

name: Update Index

on:
  schedule:
    - cron: '0 6 * * *'  # Daily at 6 AM UTC
  workflow_dispatch:
    inputs:
      dry-run:
        description: 'Dry run (no commit)'
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: update-index
  cancel-in-progress: true

jobs:
  update:
    name: Update Actions Index
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install yq
        uses: mikefarah/yq@5a7e72a743649b1b3a47d1a1d8214f3453173c51 # v4.52.4

      - name: Update index
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: scripts/update-index 2>&1 | tee /tmp/update-output.txt

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet skills/github-actions/index.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true' && inputs.dry-run != true
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          version_changes=$(grep -E '^[[:space:]]+\S+/\S+:' /tmp/update-output.txt | head -20 || true)
          total_changes=$(grep -E '^[[:space:]]+\S+/\S+:' /tmp/update-output.txt | wc -l | tr -d ' ')
          summary_line=$(grep -E '^Summary:' /tmp/update-output.txt || true)

          msg="chore: update actions index"
          if [[ -n "$version_changes" ]]; then
            msg+=$'\n\n'"${version_changes}"
            if [[ "$total_changes" -gt 20 ]]; then
              msg+=$'\n'"  ... and $((total_changes - 20)) more"
            fi
          fi
          if [[ -n "$summary_line" ]]; then
            msg+=$'\n\n'"${summary_line}"
          fi

          git add skills/github-actions/index.json
          git commit -m "$msg"
          git push

      - name: Dry run summary
        if: inputs.dry-run == true && steps.changes.outputs.changed == 'true'
        run: |
          echo "## Dry Run - Changes Found" >> $GITHUB_STEP_SUMMARY
          echo "The following changes would be made:" >> $GITHUB_STEP_SUMMARY
          echo '```diff' >> $GITHUB_STEP_SUMMARY
          git diff skills/github-actions/index.json >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: No changes
        if: steps.changes.outputs.changed == 'false'
        run: echo "No changes to index - all actions are up to date" >> $GITHUB_STEP_SUMMARY
