# Update Actions Index
# Fetches latest versions for all tracked GitHub Actions daily

name: Update Index

on:
  schedule:
    - cron: '0 6 * * *'  # Daily at 6 AM UTC
  workflow_dispatch:
    inputs:
      dry-run:
        description: 'Dry run (no PR created)'
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

concurrency:
  group: update-index
  cancel-in-progress: true

jobs:
  update:
    name: Update Actions Index
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6

      - name: Install yq
        uses: mikefarah/yq@v4

      - name: Update index
        id: update
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: scripts/update-index

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet skills/github-actions/index.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and create PR with Claude
        if: steps.changes.outputs.changed == 'true' && inputs.dry-run != true
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            The actions index has been updated by scripts/update-index. Review the
            changes in skills/github-actions/index.json, then:

            1. Check `git diff skills/github-actions/index.json` to see what changed.

            2. For any actions with new `migrations` entries that have `inputChanges`
               but no `summary` field, look up the GitHub release notes for that
               action's latest major version (use `gh release view` or `gh api`) and
               write a concise 1-2 sentence `summary` explaining what changed and a
               `notes` field with actionable migration steps. Edit the index.json
               directly to add these fields.

            3. Create a new branch named "update-index-$(date +%Y%m%d)"
            4. Commit the updated index.json with a concise conventional commit
               message summarizing what changed (version bumps, new actions, etc.)
            5. Create a PR with a summary of the version changes, highlighting any
               major version bumps and their migration impact.

            Label the PR with "automated" and "dependencies".

      - name: Dry run summary
        if: inputs.dry-run == true && steps.changes.outputs.changed == 'true'
        run: |
          echo "## Dry Run - Changes Found" >> $GITHUB_STEP_SUMMARY
          echo "The following changes would be made:" >> $GITHUB_STEP_SUMMARY
          echo '```diff' >> $GITHUB_STEP_SUMMARY
          git diff skills/github-actions/index.json >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: No changes
        if: steps.changes.outputs.changed == 'false'
        run: echo "No changes to index - all actions are up to date" >> $GITHUB_STEP_SUMMARY
