# Notify claylo-marketplace when a release is published.

name: Notify Marketplace

on:
  release:
    types: [published]

permissions:
  contents: read

concurrency:
  group: notify-marketplace
  cancel-in-progress: false

jobs:
  notify:
    name: Notify Marketplace
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Extract version
        id: version
        run: |
          version=$(jq -r '.version' .claude-plugin/plugin.json)
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Notify marketplace
        env:
          GH_TOKEN: ${{ secrets.CROSS_REPO_PAT }}
        run: |
          gh api repos/claylo/claylo-marketplace/dispatches \
            -f event_type=plugin-update \
            -f 'client_payload[plugin]=actionista' \
            -f 'client_payload[version]=${{ steps.version.outputs.version }}'
