# Automated Releases with Release Please
# Features: Conventional commits, changelog generation, versioning

name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}

    steps:
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7  # v5.0.0
        id: release
        with:
          release-type: node  # or: rust, python, go, etc.

  # Build and publish on release
  publish:
    name: Publish
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - run: npm ci
      - run: npm run build
      - run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # Upload release assets
  upload-assets:
    name: Upload Release Assets
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'

    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64
          - os: macos-latest
            target: darwin-x64
          - os: windows-latest
            target: windows-x64

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '22'

      - run: npm ci
      - run: npm run build:binary

      - name: Upload Release Asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ needs.release-please.outputs.tag_name }} \
            ./dist/myapp-${{ matrix.target }}* \
            --clobber

  # Notify on release
  notify:
    name: Notify
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [release-please, publish]
    if: needs.release-please.outputs.release_created == 'true'

    steps:
      - uses: slackapi/slack-github-action@03ea5433c137af7c0495bc0cad1af10403fc800c  # v3.0.2
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          payload: |
            channel: ${{ secrets.SLACK_CHANNEL_ID }}
            text: "Released v${{ needs.release-please.outputs.version }}"
            blocks:
              - type: section
                text:
                  type: mrkdwn
                  text: "*New Release*\nVersion: `${{ needs.release-please.outputs.version }}`\nTag: `${{ needs.release-please.outputs.tag_name }}`"

